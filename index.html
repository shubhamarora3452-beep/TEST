<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DEXP Team Management</title>
    <style>
        :root { --primary: #005686; --success: #27ae60; --danger: #e74c3c; --neutral: #7f8c8d; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { padding: 12px 24px; cursor: pointer; border: none; background: #eee; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab.active[data-type="New"] { background: var(--success); color: white; }
        .tab.active[data-type="Remove"] { background: var(--danger); color: white; }
        .tab.active[data-type="Keep"] { background: var(--primary); color: white; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#submitBtn { width: 100%; grid-column: span 2; padding: 16px; border: none; border-radius: 8px; color: white; font-size: 1.1em; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; text-align: center; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Team Member Management</h2>
        <p>Update your 3DEXPERIENCE team license information</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-type="New" onclick="switchTab('New', this)">+ Add Member</button>
        <button class="tab" data-type="Remove" onclick="switchTab('Remove', this)">- Remove Member</button>
        <button class="tab" data-type="Keep" onclick="switchTab('Keep', this)">≡ Keep Member</button>
    </div>

    <form id="teamForm">
        <input type="hidden" id="action" name="action" value="New">
        
        <div class="full">
            <label>Team/Class Name*</label>
            <input type="text" name="teamName" placeholder="e.g. Hydro Team KU Leuven" required>
        </div>

        <div>
            <label>Organization Name*</label>
            <input type="text" name="orgName" required>
        </div>

        <div>
            <label>Organization City*</label>
            <input type="text" name="orgCity" required>
        </div>

        <div>
            <label>Organization Country*</label>
            <input type="text" name="orgCountry" required>
        </div>

        <div>
            <label>User Role*</label>
            <select name="role">
                <option value="Team Member">Team Member</option>
                <option value="Leader">Leader</option>
            </select>
        </div>

        <div>
            <label>First Name*</label>
            <input type="text" name="firstName" required>
        </div>

        <div>
            <label>Last Name*</label>
            <input type="text" name="lastName" required>
        </div>

        <div>
            <label>18 years or older?*</label>
            <select name="isAdult">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div>
            <label>Email (3DEXP ID)*</label>
            <input type="email" name="email" required>
        </div>

        <div class="full">
            <label>User Country*</label>
            <input type="text" name="userCountry" required>
        </div>

        <button type="submit" id="submitBtn" style="background: var(--success);">Submit Member</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // 1. UPDATE THIS URL AFTER DEPLOYING APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyF49Z4fyG1sgFaEvqrZ4ZU_Fpf47RLPwUluXFnszyKHAfei9tIJj0Qwf9tq7Ym_ZJ8/exec";

    function switchTab(type, el) {
        document.getElementById('action').value = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        const btn = document.getElementById('submitBtn');
        if(type === 'New') btn.style.background = 'var(--success)';
        else if(type === 'Remove') btn.style.background = 'var(--danger)';
        else btn.style.background = 'var(--primary)';
        btn.innerText = type + ' Member';
    }

    document.getElementById('teamForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Processing...";

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            // Using fetch with 'no-cors' for Google Script redirects
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            status.style.display = "block";
            status.style.background = "#d4edda";
            status.innerHTML = "✅ Success! Sheet updated.";
            e.target.reset();
        } catch (err) {
            status.style.display = "block";
            status.style.background = "#f8d7da";
            status.innerHTML = "❌ Error connecting to Sheet.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Member";
        }
    });
</script>
</body>
</html>
