<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Member Team Registration</title>
    <style>
        :root { --primary: #005686; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .tabs { margin-bottom: 15px; }
        .tab { padding: 10px 20px; cursor: pointer; border: 1px solid #ddd; background: #fff; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 0.9em; }
        th { background: #f4f4f4; }
        .btn-add { background: #34495e; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 4px; grid-column: 1 / -1; font-weight: bold; }
        .btn-submit { background: var(--success); color: white; width: 100%; padding: 15px; border: none; font-size: 1.1em; margin-top: 20px; cursor: pointer; border-radius: 8px; display: none; }
        .remove-row { color: var(--danger); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Team Management Dashboard</h2>
    <p>1. Add organization details → 2. Add members to your draft list → 3. Submit all.</p>

    <div class="input-group" style="margin-bottom: 20px; background: #eef6fc;">
        <input type="text" id="teamName" placeholder="Team Name" required>
        <input type="text" id="orgName" placeholder="Organization Name">
        <input type="text" id="orgCity" placeholder="City">
        <input type="text" id="orgCountry" placeholder="Country">
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setAction('New', this)">Add New</button>
        <button class="tab" onclick="setAction('Remove', this)">Remove Member</button>
        <button class="tab" onclick="setAction('Keep', this)">Keep Member</button>
    </div>

    <div class="input-group" id="memberInputArea">
        <select id="role"><option>Team Member</option><option>Leader</option></select>
        <input type="text" id="fName" placeholder="First Name">
        <input type="text" id="lName" placeholder="Last Name">
        <input type="email" id="email" placeholder="Email (3DEXP ID)">
        <select id="adult"><option value="Yes">18+</option><option value="No">Minor</option></select>
        <input type="text" id="uCountry" placeholder="User Country">
        <button class="btn-add" onclick="addRowToList()">+ Add to Draft List</button>
    </div>

    <table id="draftTable">
        <thead>
            <tr>
                <th>Action</th><th>Name</th><th>Email</th><th>Role</th><th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button id="submitAll" class="btn-submit" onclick="submitToSheet()">Submit All Members to Google Sheet</button>
</div>

<script>
    let draftList = [];
    let currentAction = 'New';
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxECcWtZ9BSyWsuRVmh5S3q_qIC8yVXKaF6v9JvfMsGwQgJCh-9hYmpSWzRp2mciTI-/exec"; 

    function setAction(act, el) {
        currentAction = act;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function addRowToList() {
        const member = {
            action: currentAction,
            teamName: document.getElementById('teamName').value,
            orgName: document.getElementById('orgName').value,
            orgCity: document.getElementById('orgCity').value,
            orgCountry: document.getElementById('orgCountry').value,
            role: document.getElementById('role').value,
            firstName: document.getElementById('fName').value,
            lastName: document.getElementById('lName').value,
            isAdult: document.getElementById('adult').value,
            email: document.getElementById('email').value,
            userCountry: document.getElementById('uCountry').value
        };

        if(!member.email || !member.teamName) return alert("Please fill Team Name and Email at minimum.");

        draftList.push(member);
        renderTable();
        
        // Clear member fields only
        document.getElementById('fName').value = '';
        document.getElementById('lName').value = '';
        document.getElementById('email').value = '';
    }

    function renderTable() {
        const tbody = document.querySelector('#draftTable tbody');
        const submitBtn = document.getElementById('submitAll');
        tbody.innerHTML = '';
        
        draftList.forEach((m, index) => {
            const row = `<tr>
                <td><b>${m.action}</b></td>
                <td>${m.firstName} ${m.lastName}</td>
                <td>${m.email}</td>
                <td>${m.role}</td>
                <td><span class="remove-row" onclick="removeRow(${index})">✖</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        submitBtn.style.display = draftList.length > 0 ? 'block' : 'none';
    }

    function removeRow(index) {
        draftList.splice(index, 1);
        renderTable();
    }

    async function submitToSheet() {
        const btn = document.getElementById('submitAll');
        btn.disabled = true;
        btn.innerText = "Uploading... Please wait.";

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ members: draftList })
            });
            alert("Successfully uploaded " + draftList.length + " members!");
            draftList = [];
            renderTable();
        } catch (e) {
            alert("Error uploading. Check console.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit All Members to Google Sheet";
        }
    }
</script>
</body>
</html>
